[stepper_x]
step_pin: PC6
dir_pin: PA14
enable_pin: !PC7
microsteps: 16
rotation_distance: 100
full_steps_per_rotation: 200
#endstop_pin: ^PC0
endstop_pin: tmc5160_stepper_x:virtual_endstop
homing_retract_dist: 0
position_endstop: 0
position_min: -10
position_max: 2500
homing_speed: 20
homing_positive_dir: false
homing_retract_dist: 0

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 100
full_steps_per_rotation: 200
#endstop_pin: ^PC1
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_endstop: 0
position_min: -10
position_max: 2500
homing_speed: 20
homing_positive_dir: false
homing_retract_dist: 0


[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 100
full_steps_per_rotation: 200
##endstop_pin: ^PC1
endstop_pin: tmc5160_stepper_z:virtual_endstop
position_endstop: 0
position_max: 2500
homing_speed: 50
homing_positive_dir: false
homing_retract_dist: 0


[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD5
microsteps: 16
rotation_distance: 100
full_steps_per_rotation: 200
max_extrude_only_velocity: 5000
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: Generic 3950
sensor_pin: PA0
control: pid
pid_Kp: 20.837
pid_Ki: 1.037
pid_Kd: 104.708
min_temp: -273
max_temp: 2000
min_extrude_temp: -273
max_extrude_only_distance: 100000.0
max_extrude_only_distance: 100000.0
max_extrude_cross_section: 100000.0


#[filament_switch_sensor extruder_filament_sensor]
#switch_pin: ^!PC15

[heater_bed]
heater_pin: PD8
sensor_type: Generic 3950
sensor_pin: PC4
control = pid
pid_kp = 62.901
pid_ki = 1.808
pid_kd = 547.241
min_temp: -273
max_temp: 2000
min_extrude_temp: -273

